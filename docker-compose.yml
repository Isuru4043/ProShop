services:
  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: server_container
    env_file:
      - .env
    environment:
      - PORT=8000
      - NODE_ENV=development
    ports:
      - "8000:8000"

  client:
    build: ./frontend
    container_name: client_container
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
    stdin_open: true
    tty: true
